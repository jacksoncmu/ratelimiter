server:
  port: 8080

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: localhost
      port: 6379
      connect-timeout: 2s
      timeout: 1s

gateway:
  jwt:
    # HS256 key — must be Base64-encoded and at least 256 bits (32 bytes).
    # Generate one with: openssl rand -base64 32
    secret: "bXlTdXBlclNlY3JldEtleUZvckpXVEF1dGhUaGlzSXNBVGVzdA=="
  public-paths:
    - /api/v1/auth/login
    - /api/v1/auth/register

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
        spring.cloud.gateway.requests: true

logging:
  level:
    com.example.gateway: DEBUG
